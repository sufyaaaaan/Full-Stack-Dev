<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5: Chained Style Editor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div class="editor-container">
        <h1>Chained Style Editor</h1>

        <div class="toolbar">
            <button id="btn-large">Large & Blue</button>
            <button id="btn-highlight">Highlight & Italic</button>
            <button id="btn-reset">Reset Styles</button>
        </div>

        <div id="text-block">
            <p>This is a block of text that will be styled dynamically using jQuery chaining. Click the buttons above to
                apply various CSS rules to me simultaneously!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
