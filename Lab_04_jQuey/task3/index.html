<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3: Interactive Form Validation</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div class="form-container">
        <h1>Registration Form</h1>

        <div id="success-message" class="hidden">
            Registration successful! Welcome aboard.
        </div>

        <form id="registration-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username">
                <span class="error-text">Username must be at least 3 characters long.</span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-text">Please enter a valid email address.</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
                <span class="error-text">Password must be at least 6 characters long.</span>
            </div>

            <button type="submit" id="submit-btn" disabled>Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
