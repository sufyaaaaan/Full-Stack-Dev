<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog (Map)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Product Catalog</h1>

        <div class="controls">
            <div class="search-box">
                <input type="number" id="search-id" placeholder="Enter Product ID...">
                <button id="search-btn">Search</button>
            </div>
            <div class="stats">
                Total Products: <span id="product-count">0</span>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div id="product-display" class="product-grid">
            <!-- Products will be displayed here -->
        </div>

        <div class="add-section">
            <h3>Add New Product</h3>
            <div class="input-row">
                <input type="number" id="new-id" placeholder="ID">
                <input type="text" id="new-name" placeholder="Name">
                <input type="text" id="new-price" placeholder="Price">
                <button id="add-btn">Add Product</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
