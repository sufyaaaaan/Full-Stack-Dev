<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data (JSON)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Student Data Board</h1>

        <div class="json-actions">
            <button id="stringify-btn">Stringify Objects</button>
            <button id="parse-btn">Parse & Display</button>
        </div>

        <div id="json-raw" class="raw-display">
            <!-- Raw JSON string will appear here -->
        </div>

        <div id="student-grid" class="student-grid">
            <!-- Parsed student cards will appear here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
