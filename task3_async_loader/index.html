<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynchronous Data Loader</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>User Data Loader</h1>
        <div id="loader-status" class="status-box">
            <p>Initializing...</p>
        </div>
        <div id="user-display" class="user-list">
            <!-- Data will be injected here -->
        </div>
        <button id="reload-btn" class="btn">Reload Data</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
